name: Build APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build APK
        run: |
          cd ApnaKhaataAndroid  # ← Yeh line add karo agar folder name ApnaKhaataAndroid hai
          ./gradlew clean build
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug.apk
          path: ApnaKhaataAndroid/app/build/outputs/apk/debug/app-debug.apk
